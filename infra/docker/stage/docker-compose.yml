services:
  zhongwen:
    image: ghcr.io/vadimvalov/zhongwen:0.2.2 # x-release-please-version
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      NUXT_OPENAI_API_KEY: ${NUXT_OPENAI_API_KEY}
      NUXT_ELEVENLABS_API_KEY: ${NUXT_ELEVENLABS_API_KEY}
      NUXT_GOOGLE_API_KEY: ${NUXT_GOOGLE_API_KEY}
      NUXT_S3_ENDPOINT: ${NUXT_S3_ENDPOINT}
      NUXT_S3_ACCESS_KEY: ${NUXT_S3_ACCESS_KEY}
      NUXT_S3_SECRET_KEY: ${NUXT_S3_SECRET_KEY}
      NUXT_S3_BUCKET: ${NUXT_S3_BUCKET}
      NUXT_DB_URL: ${NUXT_DB_URL}
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-zhongwen}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?}
      POSTGRES_DB: ${POSTGRES_DB:-zhongwen}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-zhongwen}"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    ports:
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  minio_data:
