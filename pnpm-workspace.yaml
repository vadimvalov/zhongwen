packages:
  - apps/*
  - packages/*
  - tools/*

catalog:
  "@ai-sdk/openai": ^3.0.41
  "@aws-sdk/client-s3": ^3.1009.0
  "@elevenlabs/elevenlabs-js": ^2.39.0
  "@nuxt/content": 3.12.0
  "@nuxt/fonts": 0.14.0
  "@nuxt/image": 2.0.0
  "@nuxtjs/seo": 3.4.0
  "@nuxtjs/tailwindcss": 7.0.0-beta.1
  "@tailwindcss/vite": ^4.2.1
  "@types/node": ^24.12.0
  "@vueuse/core": ^14.2.1
  "@vueuse/nuxt": 14.2.1
  ai: ^6.0.116
  aws4fetch: ^1.0.20
  class-variance-authority: ^0.7.1
  lucide-vue-next: ^0.577.0
  nuxt: ^4.4.2
  reka-ui: ^2.9.2
  shadcn-nuxt: 2.4.3
  tailwindcss: ^4.2.1
  tslib: ^2.8.1
  tw-animate-css: ^1.4.0
  typescript: ^5
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vite-plus: latest
  vitest: npm:@voidzero-dev/vite-plus-test@latest

catalogMode: prefer
overrides:
  vite: "catalog:"
  vitest: "catalog:"
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
