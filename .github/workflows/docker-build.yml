name: Docker build

on:
  workflow_call:
    inputs:
      version:
        required: false
        type: string
    secrets:
      SERVER_HOST:
        required: false
      SERVER_USER:
        required: false
      SSH_PRIVATE_KEY:
        required: false
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository_owner }}/zhongwen
          tags: |
            type=raw,value=${{ inputs.version }},enable=${{ inputs.version != '' }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' && inputs.version == '' }}
            type=sha,enable=${{ inputs.version == '' }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/zhongwen/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Copy docker-compose to staging server
        if: ${{ inputs.version != '' }}
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: infra/docker/stage/docker-compose.yml
          target: ~/zhongwen
          strip_components: 3

      - name: Deploy to staging server
        if: ${{ inputs.version != '' }}
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/zhongwen
            docker compose pull
            docker compose up -d
